# Render Blueprint — deploys the whole app as one free web service.
# On Render: New > Blueprint > pick this repo. Render reads this file and builds
# the Dockerfile (React + FastAPI in one image). No separate database to set up:
# it uses SQLite, which auto-seeds the demo data on first boot.
services:
  - type: web
    name: vidaativa
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Single-file SQLite DB in a writable location (ephemeral — resets to the
      # seeded demo state on redeploy, which is fine for a demo).
      - key: DATABASE_URL
        value: sqlite:////tmp/vidaativa.db
      # Random signing key for JWT access tokens, generated by Render.
      - key: SECRET_KEY
        generateValue: true
