services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-seniorfit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port is published for Postgres to avoid clashing with a local
    # Postgres install. The backend reaches it over the compose network (db:5432).
    # To inspect the DB from your machine, add:  ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-seniorfit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-seniorfit}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      # Vite proxies /api to the backend service (see vite.config.ts)
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      # Host port is configurable (set FRONTEND_PORT if 5173 is taken locally).
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  pgdata:
